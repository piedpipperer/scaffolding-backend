<!DOCTYPE html>
<html lang="en">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
</head>




<body>
    <form id="registerForm">
        <input type="text" name="name" placeholder="Username" required>
        <input type="email" name="email" placeholder="email" required>
        <input type="password" name="password" placeholder="Password" required>

        <img id="captchaImage" alt="Captcha loading...">

        <input type="text" id="captcha_answer" name="captcha_answer" placeholder="Enter captcha" required>
        </select>

        <button type="submit" tabindex="0">Register</button>



        <h3>4️⃣ Google Login</h3>

        <!-- Loads One Tap login -->
        <div id="g_id_onload" data-client_id="33848130467-rs4eq57d54pq9tsckspvs8b1cna794ha.apps.googleusercontent.com"
            data-callback="handleGoogleLogin"></div>

        <!-- Standard Google button -->
        <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline"></div>

        <!-- Optional buttons for linking/unlinking -->
        <button onclick="linkGoogle()">Link Google Account</button>
        <button onclick="unlinkGoogle()">Unlink Google Account</button>

    </form>

    <button onclick="fetchUsers()">Get Users</button>
    <script type="module">
        import { fetchAndDisplayCaptcha, handleRegistration } from './test.js';

        document.addEventListener("DOMContentLoaded", () => {
            const captchaImage = document.getElementById("captchaImage");
            const registerForm = document.getElementById("registerForm");
            let captchaId = null;

            fetchAndDisplayCaptcha(captchaImage).then(id => {
                captchaId = id;
            });

            registerForm.addEventListener("submit", (event) => handleRegistration(event, captchaId));
        });
    </script>
    <script>
        async function handleGoogleLogin(response) {
            const API_BASE_URL = "https://d8ml27eov6.execute-api.eu-west-1.amazonaws.com/prod";
            console.log("ID: " + response.credential);

            try {
                const res = await fetch(`${API_BASE_URL}/google/auth`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ credential: response.credential })
                });

                if (!res.ok) {
                    const errorData = await res.json();
                    throw new Error(errorData.detail || `HTTP error! status: ${res.status}`);
                }

                const data = await res.json();
                console.log('Google login success:', data);
                alert('Google login successful!');
                // You can now use the access token from the response
                // e.g., localStorage.setItem('accessToken', data.access_token);
            } catch (error) {
                console.error('Google login error:', error);
                alert(`Google login failed: ${error.message}`);
            }
        }
    </script>
</body>


</html>
